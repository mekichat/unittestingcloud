name: Python CI

on:
   push:
     branches:
       - master 
    
   pull_request:
     branches:
       - master

jobs:
  test-and-docker:        
    name: tests, build and push Docker image

    runs-on: ubuntu-latest

    steps:
      # Step 1 clone our repo ###

      - name: Checkout repository
        uses: actions/checkout@v4
          
      # Step 2 pick and install python

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3 
      - name: show which python version is used
        run: python --version

      # Step 4
      - name: update pip
        run: python -m pip install --upgrade pip  

      # Step 5
      - name: install dependencies
        run: python -m pip install -r requirements.txt  


      # Step 6
      - name: Run unittests tests
        run: python -m unittest discover -v

      # Step 7
      - name: Run pytest tests
        run: python -m pytest -v

      # Step 8
      - name: Create SHA-256 image tag
        id: image_tag
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}-${{ github.run_id }}" | sha256sum | cut -d " " -f 1)
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 9
      - name: Debug token presence and added token ti GIT Actions
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "TOKEN IS EMPTY"
            exit 1
          else
            echo "TOKEN EXISTS"
          fi

      # Step 10
      - name: Log in to Docker hub after token is created and able to login to docker using existing password
        run: echo "${{secrets.DOCKERHUB_TOKEN}}" | docker login -u meki2026 --password-stdin  
      